<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agregar Gasto</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="title">Nuevo Gasto</div>
      </div>
      <div class="nav"><a href="./index.html">Volver</a></div>
    </div>

    <div class="main">
      <div class="card">
        <label>Concepto</label>
        <input id="concepto" class="input" placeholder="Ej: Supermercado">
        
        <label>Monto (CLP)</label>
        <input id="monto" type="number" class="input" placeholder="Ej: 15000">

        <label>Tipo de Gasto</label>
        <select id="tipo" class="input">
          <option value="necesario">Necesario (Fijo/Vital)</option>
          <option value="no_tanto">No tanto (Deseo/Gusto)</option>
        </select>

        <div class="actions">
          <button id="guardar" class="btn primary" style="width:100%">Guardar Gasto</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const KEY = "saldosmart_v3";
    
    document.getElementById("guardar").addEventListener("click", () => {
      const concepto = document.getElementById("concepto").value.trim();
      const monto = Number(document.getElementById("monto").value);
      const tipo = document.getElementById("tipo").value;

      if (!concepto || monto <= 0) {
        alert("Completa los datos correctamente");
        return;
      }

      const raw = localStorage.getItem(KEY);
      const data = raw ? JSON.parse(raw) : { saldoBase: 0, gastos: [] };

      data.gastos.push({
        id: Date.now(), // ID único para borrar correctamente
        fecha: new Date().toLocaleDateString('es-CL'),
        concepto,
        monto: Math.round(monto),
        tipo
      });

      localStorage.setItem(KEY, JSON.stringify(data));
      window.location.href = "./index.html";
    });
  </script>
</body>
</html>
