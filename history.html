<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Historial — SaldoSmart</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><div class="title">Historial Completo</div></div>
      <div class="nav"><a href="./index.html">Inicio</a></div>
    </div>

    <div class="main" style="grid-template-columns: 1fr;">
      <div class="card">
        <input id="q" class="input" placeholder="Buscar por concepto..." style="margin-bottom: 20px;">
        
        <div class="tabla-scroll" style="max-height: none;">
          <table>
            <thead>
              <tr><th>Fecha</th><th>Concepto</th><th>Monto</th><th>Tipo</th><th></th></tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        
        <div style="margin-top: 20px; text-align: center;">
          <button id="btnBorrarTodo" class="btn" style="color: #ff6b6b; border-color: #ff6b6b66;">Limpiar todos los datos</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const KEY = "saldosmart_v3";

  function moneyCLP(n) {
    return Number(n || 0).toLocaleString("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 });
  }

  function render() {
    const raw = localStorage.getItem(KEY);
    const data = raw ? JSON.parse(raw) : { saldoBase: 0, gastos: [] };
    const q = document.getElementById("q").value.toLowerCase();
    const tbody = document.getElementById("rows");
    
    tbody.innerHTML = "";
    const filtrados = data.gastos.filter(g => g.concepto.toLowerCase().includes(q)).reverse();

    if(filtrados.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center" class="muted">No hay registros</td></tr>';
      return;
    }

    filtrados.forEach(g => {
      tbody.insertAdjacentHTML("beforeend", `
        <tr>
          <td style="font-size: 11px;">${g.fecha}</td>
          <td>${g.concepto}</td>
          <td>${moneyCLP(g.monto)}</td>
          <td><span class="tag">${g.tipo === 'necesario' ? 'Nec' : 'Gusto'}</span></td>
          <td><button class="delete-btn" onclick="eliminarGasto(${g.id})">✕</button></td>
        </tr>
      `);
    });
  }

  function eliminarGasto(id) {
    if(!confirm("¿Eliminar este registro?")) return;
    const data = JSON.parse(localStorage.getItem(KEY));
    data.gastos = data.gastos.filter(g => g.id !== id);
    localStorage.setItem(KEY, JSON.stringify(data));
    render();
  }

  document.getElementById("q").addEventListener("input", render);
  document.getElementById("btnBorrarTodo").addEventListener("click", () => {
    if(confirm("¿BORRAR TODO? Esto no se puede deshacer.")) {
      localStorage.removeItem(KEY);
      render();
    }
  });

  render();
</script>
</body>
</html>
