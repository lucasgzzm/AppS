<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SaldoSmart — Inicio</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0b0f17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SaldoSmart">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body{
      margin:0;
      background:#0b0f17;
      color:#e8eefc;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }
    .wrap{ width:100%; max-width:850px; padding:20px; }

    /* Header centrado */
    .top{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:12px;
    }
    .brand{ font-weight:900; font-size:18px; }

    .nav{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .nav a{
      color:#e8eefc;
      text-decoration:none;
      padding:10px 16px;
      border:1px solid #2a3550;
      border-radius:12px;
    }
    .nav a:hover{ background:#121a2b; }

    .grid{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:16px;
      margin-top:20px;
    }
    @media (max-width: 860px){ .grid{ grid-template-columns:1fr; } }

    .card{
      background:#0f1626;
      border:1px solid #24314d;
      border-radius:18px;
      padding:18px;
    }
    .muted{ color:#a9b6d3; font-size:14px; }
    .big{ font-size:36px; font-weight:900; margin:6px 0 12px; }

    .row{ display:flex; gap:12px; flex-wrap:wrap; }
    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid #2a3550;
      background:#0b1222;
    }
    .pill b{ display:block; font-size:18px; }

    .input{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid #2a3550;
      background:#0b1222;
      color:#e8eefc;
      outline:none;
    }

    .btn{
      display:inline-block;
      padding:12px 20px;
      border-radius:14px;
      border:1px solid #2a3550;
      background:#121a2b;
      color:#e8eefc;
      text-decoration:none;
      cursor:pointer;
      transition:.2s;
    }
    .btn:hover{ filter:brightness(1.1); transform: translateY(-1px); }

    .center-btn{
      margin-top:15px;
      display:flex;
      justify-content:center;
    }

    table{ width:100%; border-collapse:collapse; margin-top:12px; }
    th, td{ padding:8px; border-bottom:1px solid #1f2a43; font-size:14px; }
    th{ color:#a9b6d3; }
    .tag{ font-size:12px; padding:4px 8px; border-radius:999px; border:1px solid #2a3550; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="brand">💳 SaldoSmart</div>
        <div class="muted">Organiza tu saldo: necesarios vs no tanto</div>
      </div>

      <div class="nav">
        <a href="./index.html">Inicio</a>
        <a href="./add.html">+ Agregar gasto</a>
        <a href="./history.html">Historial</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="muted">Saldo actual</div>
        <div id="saldo" class="big">$0</div>

        <div class="row">
          <div class="pill"><span class="muted">Necesarios</span><b id="sumNecesarios">$0</b></div>
          <div class="pill"><span class="muted">No tanto</span><b id="sumNoTanto">$0</b></div>
          <div class="pill"><span class="muted">Total gastos</span><b id="sumTotal">$0</b></div>
        </div>

        <hr style="border:none;border-top:1px solid #1f2a43;margin:16px 0;">

        <div class="muted" style="text-align:left;">Actualizar saldo base</div>
        <input id="nuevoSaldo" class="input" placeholder="Ej: 250000">

        <div class="center-btn">
          <button id="btnGuardarSaldo" class="btn">Guardar saldo</button>
        </div>

        <div id="msg" class="muted" style="margin-top:10px; text-align:center;"></div>
      </div>

      <div class="card">
        <div class="muted">Últimos 5 gastos</div>
        <table>
          <thead>
            <tr><th>Concepto</th><th>Monto</th><th>Tipo</th></tr>
          </thead>
          <tbody id="ultimos"></tbody>
        </table>

        <div class="center-btn">
          <a class="btn" href="./add.html">Agregar uno nuevo</a>
        </div>
      </div>
    </div>
  </div>

<script>
  // PWA (cache/offline)
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }

  const KEY = "saldosmart_v1";

  function moneyCLP(n){
    return Number(n || 0).toLocaleString("es-CL", {
      style:"currency", currency:"CLP", maximumFractionDigits:0
    });
  }

  function load(){
    const raw = localStorage.getItem(KEY);
    if(!raw) return { saldoBase: 0, gastos: [] };
    try { return JSON.parse(raw); } catch { return { saldoBase: 0, gastos: [] }; }
  }

  function save(data){ localStorage.setItem(KEY, JSON.stringify(data)); }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function render(){
    const data = load();
    let necesarios = 0, noTanto = 0;

    for(const g of data.gastos){
      const m = Number(g.monto || 0);
      if(g.tipo === "necesario") necesarios += m;
      else noTanto += m;
    }

    const total = necesarios + noTanto;
    const saldoActual = Number(data.saldoBase || 0) - total;

    document.getElementById("saldo").textContent = moneyCLP(saldoActual);
    document.getElementById("sumNecesarios").textContent = moneyCLP(necesarios);
    document.getElementById("sumNoTanto").textContent = moneyCLP(noTanto);
    document.getElementById("sumTotal").textContent = moneyCLP(total);

    const tbody = document.getElementById("ultimos");
    tbody.innerHTML = "";

    const last = [...data.gastos].slice(-5).reverse();
    if(last.length === 0){
      tbody.innerHTML = `<tr><td colspan="3" class="muted">Aún no agregas gastos.</td></tr>`;
      return;
    }

    for(const g of last){
      tbody.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${escapeHtml(g.concepto || "")}</td>
          <td>${moneyCLP(g.monto)}</td>
          <td><span class="tag">${g.tipo==="necesario"?"Necesario":"No tanto"}</span></td>
        </tr>
      `);
    }
  }

  document.getElementById("btnGuardarSaldo").addEventListener("click", ()=>{
    const input = document.getElementById("nuevoSaldo");
    const val = input.value.replace(/\./g,"").replace(/,/g,"").trim();
    const num = Number(val);
    const msg = document.getElementById("msg");

    if(!Number.isFinite(num) || num < 0){
      msg.textContent = "Pon un saldo válido (ej: 250000).";
      return;
    }

    const data = load();
    data.saldoBase = Math.round(num);
    save(data);
    input.value = "";
    msg.textContent = "✅ Saldo base actualizado.";
    render();
  });

  render();
</script>
</body>
</html>
