<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <title>SaldoSmart</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="wrap">
    <header style="margin-bottom: 30px;">
      <h2 style="margin:0; font-weight: 800;">Hola, <span style="color: var(--accent-light);">Smart User</span></h2>
      <p class="muted">Este es tu resumen de hoy</p>
    </header>

    <div class="card" style="background: linear-gradient(135deg, #1e2a4a 0%, #0b1020 100%);">
      <div class="muted" style="color: #a9b6d3;">Saldo Disponible</div>
      <div id="saldo" class="big">$0</div>
      
      <div style="display: flex; gap: 15px; margin-top: 15px;">
        <div>
          <div class="muted" style="font-size: 0.7rem;">META AHORRO</div>
          <div id="metaAhorro" style="color: var(--accent-light); font-weight: 700;">$0</div>
        </div>
        <div style="border-left: 1px solid var(--border); padding-left: 15px;">
          <div class="muted" style="font-size: 0.7rem;">DISPONIBLE REAL</div>
          <div id="disponibleReal" style="font-weight: 700;">$0</div>
        </div>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
      <div class="card" style="margin:0; padding: 15px;">
        <div class="muted">Necesario</div>
        <div id="sumNecesarios" style="color: var(--success); font-weight: 700;">$0</div>
      </div>
      <div class="card" style="margin:0; padding: 15px;">
        <div class="muted">Gustos</div>
        <div id="sumNoTanto" style="color: #ffb800; font-weight: 700;">$0</div>
      </div>
    </div>

    <h3 style="font-size: 1.1rem; margin-bottom: 15px;">Movimientos recientes</h3>
    <div id="listaGastos">
      </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <div style="font-size: 1.5rem;">🏠</div>
      Inicio
    </a>
    <a href="add.html" class="nav-item">
      <div style="font-size: 1.5rem;">➕</div>
      Gasto
    </a>
    <a href="history.html" class="nav-item">
      <div style="font-size: 1.5rem;">📊</div>
      Historial
    </a>
  </nav>

  <script>
    // Usa la misma lógica de JS que te di antes, 
    // pero actualiza el render() para crear "divs" en lugar de "tr" 
    // para que se vea mejor en móviles.
    function render() {
      const data = load();
      // ... (cálculos de saldo igual a la versión anterior) ...

      const lista = document.getElementById("listaGastos");
      lista.innerHTML = "";
      
      [...data.gastos].reverse().slice(0, 4).forEach(g => {
        lista.innerHTML += `
          <div class="card" style="padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            <div>
              <div style="font-weight: 600; font-size: 0.9rem;">${g.concepto}</div>
              <div class="muted" style="font-size: 0.7rem;">${g.fecha}</div>
            </div>
            <div style="text-align: right;">
              <div style="font-weight: 800;">${moneyCLP(g.monto)}</div>
              <span class="tag" style="font-size: 0.5rem;">${g.tipo}</span>
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
